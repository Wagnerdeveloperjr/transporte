<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Transporte - EMEF Herbert de Souza</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>EMEF "Herbert de Souza"</h1>
            <p>Controle de Acesso ao Transporte Escolar</p>
        </header>

        <form id="formMatricula">
            <fieldset>
                <legend>Identificação do Estudante</legend>
                <label>Nome Completo:</label>
                <input type="text" id="nome" placeholder="INSIRA AQUI O NOME COMPLETO DO ALUNO(A)" required>
                
                <div class="row">
                    <div>
                        <label>CPF:</label>
                        <input type="text" id="cpf" placeholder="000.000.000-00">
                    </div>
                    <div>
                        <label>Data de Nascimento:</label>
                        <input type="date" id="nascimento">
                    </div>
                </div>
            </fieldset>

            <fieldset>
                <legend>Escolaridade e Transporte</legend>
                <div class="row">
                    <div>
                        <label>Ano/Etapa:</label>
                        <input type="text" id="etapa" placeholder="Ex: 8º ANO">
                    </div>
                    <div>
                        <label>Turma:</label>
                        <input type="text" id="turma" placeholder="Ex: 8º ANO D V">
                    </div>
                </div>
                
                <label>Bairro:</label>
                <input type="text" id="bairro" placeholder="Ex: BAIRRO DA ZONA RURAL">
                
                <label>Utiliza Transporte Escolar?</label>
                <select id="usaTransporte">
                    <option value="SIM">SIM</option>
                    <option value="NÃO">NÃO</option>
                </select>
            </fieldset>

            <button type="submit" id="btnSalvar">Registrar Embarque</button>
        </form>
    </div>
    <script src="script.js"></script>
</body>
</html>
